<svg width="900" height="520" viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#24292F" flood-opacity="0.07"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 1 L 8 5 L 0 9 Z" fill="#6E7781"/>
    </marker>
    <linearGradient id="gradExplore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#0969DA"/>
    </linearGradient>
    <linearGradient id="gradReuse" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#56D364"/>
      <stop offset="100%" stop-color="#2DA44E"/>
    </linearGradient>
    <linearGradient id="gradCore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D2A8FF"/>
      <stop offset="100%" stop-color="#8957E5"/>
    </linearGradient>
  </defs>

  <rect width="900" height="520" fill="#FFFFFF" rx="12"/>

  <!-- Explore Once -->
  <rect x="70" y="80" width="260" height="170" rx="16" fill="#F6F8FA" stroke="#D0D7DE" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#shadow)"/>
  <text x="200" y="110" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#24292F">Explore Once</text>
  <line x1="90" y1="122" x2="310" y2="122" stroke="#D0D7DE" stroke-width="1"/>

  <!-- Reuse Forever -->
  <rect x="570" y="80" width="260" height="170" rx="16" fill="#F6F8FA" stroke="#D0D7DE" stroke-width="1.5" stroke-dasharray="6,4" filter="url(#shadow)"/>
  <text x="700" y="110" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" font-weight="700" fill="#24292F">Reuse Forever</text>
  <line x1="590" y1="122" x2="810" y2="122" stroke="#D0D7DE" stroke-width="1"/>

  <!-- A: AI Explores the Web -->
  <g transform="translate(130, 148)">
    <rect width="140" height="56" rx="12" fill="url(#gradExplore)" filter="url(#shadow)"/>
    <circle cx="34" cy="28" r="8" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="40" y1="34" x2="46" y2="40" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <text x="86" y="26" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">AI Explores</text>
    <text x="86" y="43" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">the Web</text>
  </g>

  <!-- B: Direct Call -->
  <g transform="translate(630, 148)">
    <rect width="140" height="56" rx="12" fill="url(#gradReuse)" filter="url(#shadow)"/>
    <path d="M 30 20 L 40 28 L 30 36" fill="none" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="40" y1="28" x2="48" y2="28" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
    <text x="87" y="25" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" font-weight="700" fill="#FFFFFF">Direct Call</text>
    <text x="87" y="43" text-anchor="middle" font-family="'SF Mono',Monaco,Consolas,monospace" font-size="11" fill="rgba(255,255,255,0.9)">domain/action</text>
  </g>

  <!-- C: Command Library (widened to 240px, shifted left to x=330, icon & text separated) -->
  <g transform="translate(330, 380)">
    <rect width="240" height="70" rx="35" fill="url(#gradCore)" filter="url(#shadow)"/>
    <!-- Database icon on the left -->
    <ellipse cx="38" cy="26" rx="9" ry="4.5" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 29 26 L 29 37 A 9 4.5 0 0 0 47 37 L 47 26" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <path d="M 29 31.5 A 9 4.5 0 0 0 47 31.5" fill="none" stroke="#FFFFFF" stroke-width="2"/>
    <!-- Text on the right, no overlap -->
    <text x="142" y="37" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="16" font-weight="700" fill="#FFFFFF">Command Library</text>
  </g>

  <!-- A -> C: distill -->
  <path d="M 200 204 C 200 300, 280 415, 330 415" fill="none" stroke="#6E7781" stroke-width="2.5" marker-end="url(#arrow)"/>
  <g transform="translate(245, 287)">
    <rect width="70" height="26" rx="13" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="35" y="17" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="600" fill="#24292F">distill</text>
  </g>

  <!-- C -> B: Provide Capability -->
  <path d="M 570 415 C 570 300, 700 300, 700 204" fill="none" stroke="#6E7781" stroke-width="2.5" marker-end="url(#arrow)"/>
  <g transform="translate(575, 287)">
    <rect width="110" height="26" rx="13" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="55" y="17" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="600" fill="#24292F">Provide Capability</text>
  </g>

  <!-- B -> C: Feedback / Optimize -->
  <path d="M 700 204 C 700 360, 600 415, 570 415" fill="none" stroke="#6E7781" stroke-width="2.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <g transform="translate(565, 335)">
    <rect width="110" height="26" rx="13" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="55" y="17" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="12" font-weight="600" fill="#24292F">Feedback / Optimize</text>
  </g>

  <!-- Footer -->
  <text x="450" y="490" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif" font-size="13" fill="#6E7781" letter-spacing="0.5">
    AI Explores → Distill into Commands → Reuse Forever → Continuously Feed Back to Library
  </text>
</svg>